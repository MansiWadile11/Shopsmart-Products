<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order History - ShopSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #000;
      --card: #fff;
    }
    body.dark-mode {
      --bg: #121212;
      --text: #fff;
      --card: #1e1e1e;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
    }
    .card {
      background-color: var(--card);
    }
    .product-image {
      height: 60px;
      object-fit: contain;
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>📦 Order History</h2>
      <div>
        <button class="btn btn-sm btn-secondary" onclick="toggleDarkMode()">Toggle Dark Mode</button>
        <a href="index.html" class="btn btn-sm btn-outline-primary ms-2">Back to Shop</a>
      </div>
    </div>

    <div id="ordersList" class="row g-4"></div>
  </div>

  <script>
    async function loadOrderHistory() {
      const orders = JSON.parse(localStorage.getItem('orderHistory')) || [];
      const container = document.getElementById('ordersList');
      container.innerHTML = '';

      if (orders.length === 0) {
        container.innerHTML = '<p class="text-center text-danger">No orders placed yet.</p>';
        return;
      }

      for (const order of orders.reverse()) {
        const products = await Promise.all(order.items.map(id =>
          fetch(`https://dummyjson.com/products/${id}`).then(res => res.json())
        ));

        const productThumbnails = products.map(p =>
          `<img src="${p.thumbnail}" alt="${p.title}" class="product-image" title="${p.title}">`
        ).join('');

        const col = document.createElement('div');
        col.className = 'col-12';
        col.innerHTML = `
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">Order ID: ${order.orderId}</h5>
              <p class="mb-1">Date: ${order.date}</p>
              <p class="mb-2">Total: ₹${order.total}</p>
              <div>Items: ${productThumbnails}</div>
            </div>
          </div>
        `;
        container.appendChild(col);
      }
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }

    loadOrderHistory();
  </script>
</body>
</html>
