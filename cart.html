<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart - ShopSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #000;
      --card: #fff;
    }
    body.dark-mode {
      --bg: #121212;
      --text: #fff;
      --card: #1e1e1e;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
    }
    .product-image {
      height: 100px;
      object-fit: contain;
    }
    .card {
      background-color: var(--card);
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>🛒 Your Cart</h2>
      <button class="btn btn-sm btn-secondary" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>
    
    <!-- Add Order History link -->
    <div class="d-flex justify-content-between mb-3">
      <a href="order-history.html" class="btn btn-sm btn-outline-success">Order History</a>
    </div>

    <div id="cartItems" class="row g-3"></div>
    <hr>
    <div class="text-end">
      <a href="checkout.html" class="btn btn-primary">Proceed to Checkout</a>
    </div>
  </div>

  <script>
    // Load Cart Items from LocalStorage
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const cartItemsContainer = document.getElementById('cartItems');
      cartItemsContainer.innerHTML = '';

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<p class="text-center text-danger">Your cart is empty.</p>';
      } else {
        cart.forEach(id => {
          fetch(`https://dummyjson.com/products/${id}`)
            .then(res => res.json())
            .then(product => {
              const col = document.createElement('div');
              col.className = 'col-12 col-md-6 col-lg-4';
              col.innerHTML = `
                <div class="card h-100 shadow-sm">
                  <img src="${product.thumbnail}" class="card-img-top product-image" alt="${product.title}">
                  <div class="card-body">
                    <h6 class="product-title">${product.title}</h6>
                    <p><strong>₹${product.price}</strong></p>
                    <button class="btn btn-sm btn-danger" onclick='removeFromCart(${id})'>Remove</button>
                  </div>
                </div>
              `;
              cartItemsContainer.appendChild(col);
            });
        });
      }
    }

    // Remove Item from Cart
    function removeFromCart(productId) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart = cart.filter(id => id !== productId);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    // Toggle Dark Mode
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }

    loadCart();
  </script>
</body>
</html>
