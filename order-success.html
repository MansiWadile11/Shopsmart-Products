<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Success - ShopSmart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body.dark-mode {
      background-color: #121212;
      color: #ffffff;
    }
    .btn-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }
  </style>
</head>
<body class="bg-light">

  <!-- Dark Mode Toggle -->
  <div class="btn-toggle">
    <button onclick="toggleDarkMode()" class="btn btn-sm btn-outline-secondary">🌙 Toggle Dark Mode</button>
  </div>

  <div class="container text-center py-5">
    <h1 class="mb-4">✅ Order Placed Successfully!</h1>
    <p class="lead">Thank you for shopping with <strong>ShopSmart</strong>.</p>
    
    <div class="mt-5">
      <a href="order-history.html" class="btn btn-outline-success me-2">📦 View Order History</a>
      <a href="index.html" class="btn btn-primary">🛍️ Continue Shopping</a>
    </div>
  </div>

  <script>
    // Dark mode toggle
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }
  </script>

</body>
</html>
