<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - ShopSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h2>🛒 Checkout</h2>
    <div id="checkoutItems" class="row g-3"></div>
    <hr>
    <div class="text-end">
      <h4>Total: ₹<span id="totalPrice">0</span></h4>
      <button class="btn btn-success" onclick="placeOrder()">Place Order</button>
    </div>

    <!-- Order History Link -->
    <div class="mt-4 text-center">
      <a href="order-history.html" class="btn btn-sm btn-outline-success ms-2">Order History</a>
    </div>
  </div>

  <script>
    // Checkout page functionality
    function loadCheckout() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const checkoutItemsContainer = document.getElementById('checkoutItems');
      let total = 0;
      checkoutItemsContainer.innerHTML = '';

      if (cart.length === 0) {
        checkoutItemsContainer.innerHTML = '<p class="text-center text-danger">Your cart is empty.</p>';
      } else {
        cart.forEach(id => {
          fetch(`https://dummyjson.com/products/${id}`)
            .then(res => res.json())
            .then(product => {
              total += product.price;
              const col = document.createElement('div');
              col.className = 'col-12 col-md-6 col-lg-4';
              col.innerHTML = `
                <div class="card h-100 shadow-sm">
                  <img src="${product.thumbnail}" class="card-img-top product-image" alt="${product.title}">
                  <div class="card-body">
                    <h6 class="product-title">${product.title}</h6>
                    <p><strong>₹${product.price}</strong></p>
                  </div>
                </div>
              `;
              checkoutItemsContainer.appendChild(col);
            });
        });
      }

      document.getElementById('totalPrice').textContent = total;
    }

    // Place Order function
    function placeOrder() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      if (cart.length === 0) {
        alert('Your cart is empty. Cannot place order.');
        return;
      }

      // Store the order in localStorage
      const orderHistory = JSON.parse(localStorage.getItem('orderHistory')) || [];
      orderHistory.push({
        orderId: `ORD-${Date.now()}`,
        items: cart,
        total: document.getElementById('totalPrice').textContent,
        date: new Date().toLocaleString()
      });

      localStorage.setItem('orderHistory', JSON.stringify(orderHistory));
      localStorage.setItem('cart', JSON.stringify([])); // Clear the cart

      alert('Order placed successfully!');
      window.location.href = 'order-success.html'; // Redirect to order success page
    }

    loadCheckout();
  </script>
</body>
</html>
